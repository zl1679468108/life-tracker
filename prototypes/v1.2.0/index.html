<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <title>LifeTracker v1.2.0</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/workbench.css">
  <link rel="stylesheet" href="css/messages.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <div class="app-shell">
    <!-- 页面容器 -->
    <div class="page-container" id="page-container">

      <!-- ==================== 首页 ==================== -->
      <div class="page active" id="page-home">
        <!-- 问候语 + 通知 -->
        <div class="greeting-section">
          <div class="greeting-text">
            <h1 id="greeting-text">早上好</h1>
            <p>今天也要加油哦</p>
          </div>
          <button class="notification-btn" id="bell-btn" aria-label="通知">
            🔔
            <span class="dot" id="notif-badge" style="display:none"></span>
          </button>
        </div>

        <!-- 搜索框 -->
        <div class="search-bar-wrapper">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="global-search" placeholder="搜索物品、待办、对话...">
            <button class="clear-btn" id="search-clear">✕</button>
          </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
          <div class="stat-card primary">
            <div class="stat-icon">📦</div>
            <div class="stat-number" id="stat-items">0</div>
            <div class="stat-label">物品</div>
          </div>
          <div class="stat-card secondary">
            <div class="stat-icon">📋</div>
            <div class="stat-number" id="stat-todos">0</div>
            <div class="stat-label">待完成</div>
          </div>
          <div class="stat-card success">
            <div class="stat-icon">✅</div>
            <div class="stat-number" id="stat-completed">0</div>
            <div class="stat-label">已完成</div>
          </div>
        </div>

        <!-- 快捷操作 -->
        <div class="section-label">快捷操作</div>
        <div class="quick-actions" id="quick-actions"></div>

        <!-- 最近待办 -->
        <div class="todo-list-section">
          <div class="todo-list-header">
            <h3>最近待办</h3>
            <span class="see-all" onclick="App.switchTab('workbench')">查看全部 →</span>
          </div>
          <div id="recent-todos"></div>
        </div>
      </div>

      <!-- ==================== 工作台 ==================== -->
      <div class="page" id="page-workbench">
        <div class="page-header">
          <h2>工作台</h2>
        </div>
        <div style="padding: 0 var(--space-xl)">
          <!-- 分段控制器 -->
          <div class="segment-control" id="seg-controls">
            <button class="segment-item active" data-view="items">物品</button>
            <button class="segment-item" data-view="todos">待办</button>
          </div>

          <!-- 物品视图 -->
          <div class="item-view active" id="item-view">
            <!-- 搜索 + 排序 -->
            <div class="toolbar">
              <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="wb-search" placeholder="搜索物品..." style="padding-left:36px">
              </div>
              <button class="sort-btn" id="sort-btn" aria-label="排序">⇅</button>
            </div>
            <!-- 分类 Chips -->
            <div class="chips-row" id="category-chips"></div>
            <!-- 物品列表 -->
            <div id="item-list"></div>
          </div>

          <!-- 待办视图 -->
          <div class="todo-view" id="todo-view">
            <!-- 筛选 Tabs -->
            <div class="segment-control" id="todo-tabs" style="margin-bottom:var(--space-md)"></div>
            <!-- 待办列表 -->
            <div id="todo-list"></div>
          </div>
        </div>

        <!-- 功能卡片矩阵 -->
        <div class="section-label">功能入口</div>
        <div class="cards-grid" id="feature-cards"></div>

        <!-- FAB -->
        <button class="fab" id="fab" aria-label="添加">+</button>
      </div>

      <!-- ==================== 消息 ==================== -->
      <div class="page" id="page-messages">
        <div class="page-header">
          <h2>消息</h2>
        </div>
        <div class="conv-list" id="conv-list"></div>

        <!-- FAB -->
        <button class="fab" id="fab-msg" aria-label="新建对话">+</button>
      </div>

      <!-- 对话详情页 -->
      <div class="detail-page" id="detail-page">
        <div class="detail-header">
          <button class="back-btn" id="back-btn" aria-label="返回">←</button>
          <div class="detail-header-info">
            <div class="detail-header-name" id="detail-name"></div>
            <div class="detail-header-status" id="detail-status">在线</div>
          </div>
        </div>
        <div class="msg-list" id="msg-list"></div>
        <div class="msg-input-bar">
          <button class="share-btn" aria-label="分享" onclick="App.showToast('快速分享功能开发中')">📎</button>
          <input type="text" class="input" id="msg-input" placeholder="输入消息..." style="border-radius:22px">
          <button class="send-btn" id="send-btn" aria-label="发送">➤</button>
        </div>
      </div>

      <!-- ==================== 我的 ==================== -->
      <div class="page" id="page-settings">
        <div class="page-header transparent">
          <h2>我的</h2>
        </div>

        <!-- 个人信息卡片 -->
        <div class="settings-profile">
          <div class="avatar avatar-lg">👤</div>
          <div class="settings-profile-info">
            <div class="settings-profile-name" id="profile-name">赵龙</div>
            <div class="settings-profile-email" id="profile-email">zhaolong@example.com</div>
          </div>
        </div>

        <!-- 设置分组 -->
        <div id="settings-groups"></div>

        <!-- 退出登录 -->
        <div style="padding: var(--space-xl) var(--space-xl)">
          <button class="btn btn-danger" id="logout-btn" style="width:100%">退出登录</button>
        </div>

        <!-- 版本 -->
        <div class="version-info">
          <div class="app-name">LifeTracker</div>
          <div id="version-num">v1.2.0-draft</div>
        </div>
      </div>
    </div>

    <!-- ==================== 底部 Tab 导航 ==================== -->
    <nav class="tab-bar">
      <button class="tab-item active" data-page="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab-item" data-page="workbench">
        <span class="tab-icon">🛠️</span>
        <span class="tab-label">工作台</span>
      </button>
      <button class="tab-item" data-page="messages">
        <span class="tab-icon">💬</span>
        <span class="tab-label">消息</span>
        <span class="tab-badge" id="msg-badge" style="display:none"></span>
      </button>
      <button class="tab-item" data-page="settings">
        <span class="tab-icon">👤</span>
        <span class="tab-label">我的</span>
      </button>
    </nav>

    <!-- ==================== 排序弹窗 ==================== -->
    <div class="modal-overlay" id="sort-modal">
      <div class="modal-sheet">
        <h3 style="font-size:var(--font-xl);font-weight:700;margin-bottom:var(--space-lg)">排序方式</h3>
        <div class="sort-options" id="sort-options"></div>
        <div style="margin-top:var(--space-xl);text-align:center">
          <button class="btn btn-secondary" onclick="App.hideModal('sort-modal')" style="width:100%">取消</button>
        </div>
      </div>
    </div>

    <!-- ==================== 创建表单弹窗 ==================== -->
    <div class="modal-overlay" id="create-modal">
      <div class="modal-sheet">
        <h3 style="font-size:var(--font-xl);font-weight:700;margin-bottom:var(--space-lg)" id="create-title">新建物品</h3>
        <form id="create-form"></form>
      </div>
    </div>

    <!-- ==================== 新建对话弹窗 ==================== -->
    <div class="modal-overlay" id="new-conv-modal">
      <div class="modal-sheet">
        <div class="new-conv-panel" id="new-conv-body"></div>
      </div>
    </div>
  </div>

  <!-- Mock Data (全局变量, 不用 ES module) -->
  <script src="data/mock.js"></script>
  <!-- App Core -->
  <script src="js/app.js"></script>
  <!-- Page Modules -->
  <script src="js/home.js"></script>
  <script src="js/workbench.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/settings.js"></script>
  <!-- Init -->
  <script>
    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
